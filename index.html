<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
canvas{
  display:block;
  image-rendering:pixelated;
  max-width:100vw;
  max-height:100vh;
  width:auto;
  height:auto;
  aspect-ratio:16/9;
}
body{
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  background:#000;
  margin:0;
  overflow:hidden;
}

#settings-inner{display:flex;flex-direction:column;align-items:center;gap:12px;background:rgba(5,5,15,0.98);border:1px solid #333;padding:24px 40px;max-height:90vh;overflow-y:auto;min-width:400px;}
.s-title{font-size:13px;letter-spacing:4px;color:#555;margin-bottom:8px;}

.s-label{font-size:11px;color:#666;letter-spacing:2px;width:160px;}

.s-val{font-size:11px;color:#4af;width:36px;text-align:right;}
.s-keybind{display:flex;justify-content:space-between;width:360px;padding:6px 0;border-bottom:1px solid #111;}
.s-key{font-size:10px;color:#444;letter-spacing:1px;}
.s-keyval{font-size:10px;color:#888;letter-spacing:1px;}
.s-close{padding:8px 24px;background:#0a0a12;color:#666;border:1px solid #222;font-family:'Courier New';font-size:11px;letter-spacing:2px;cursor:pointer;margin-top:8px;}
.s-close:hover{border-color:#4af;color:#4af;}

/* COOKIE BANNER */

  display:none;position:fixed;bottom:0;left:0;right:0;

window.onerror=function(msg,src,line,col,err){
  console.error('neverEND error:',msg,'at',src+':'+line+':'+col,err);

// ======== SAVE DATA (localStorage) ========
const SAVE_KEY='neverend_save';
let _saveCache=null;
function loadSave(){
  if(_saveCache)return _saveCache;
  try{_saveCache=JSON.parse(localStorage.getItem(SAVE_KEY))||{};}
  catch(e){_saveCache={};}
  return _saveCache;
}
function writeSave(d){
  _saveCache=d;
  try{localStorage.setItem(SAVE_KEY,JSON.stringify(d));}catch(e){}
}
function getStat(k,def){if(def===undefined)def=0;const v=loadSave()[k];return v!==undefined?v:def;}
function setStat(k,v){const d=loadSave();d[k]=v;writeSave(d);}
function incStat(k,by){if(by===undefined)by=1;setStat(k,(getStat(k))+by);}

// ======== AUDIO ========
let ac=null,bgmTimer=null,bgmStep=0,bgmTempo=0.18,bgmTrack=0;
let droneNode=null,droneGain=null;
function getAC(){if(!ac)ac=new(window.AudioContext||window.webkitAudioContext)();return ac;}
function tone(freq,dur,type,vol,delay){
  if(!freq)return;delay=delay||0;vol=(vol||0.08)*volBGM;
  const a=getAC(),o=a.createOscillator(),g=a.createGain(),f=a.createBiquadFilter();
  f.type='lowpass';f.frequency.value=2400;o.connect(f);f.connect(g);g.connect(a.destination);
  o.type=type||'square';o.frequency.setValueAtTime(freq,a.currentTime+delay);
  g.gain.setValueAtTime(0.001,a.currentTime+delay);
  g.gain.linearRampToValueAtTime(vol,a.currentTime+delay+0.012);
  g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+delay+dur);
  o.start(a.currentTime+delay);o.stop(a.currentTime+delay+dur+0.05);
}
function nz(dur,vol,delay,hp,sfx){
  delay=delay||0;hp=hp||3000;vol=(vol||0.06)*(sfx?volSFX:volBGM);
  const a=getAC(),buf=a.createBuffer(1,a.sampleRate*dur,a.sampleRate),d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;
  const src=a.createBufferSource(),g=a.createGain(),f=a.createBiquadFilter();
  f.type='highpass';f.frequency.value=hp;
  src.buffer=buf;src.connect(f);f.connect(g);g.connect(a.destination);
  g.gain.setValueAtTime(vol,a.currentTime+delay);
  g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+delay+dur);
  src.start(a.currentTime+delay);src.stop(a.currentTime+delay+dur+0.05);
}
function sfxTone(f,d,t,v,dl){tone(f,d,t,(v||0.08)*(volSFX/volBGM||1),dl);}
function sfxJump(){sfxTone(220,0.06,'square',0.12);sfxTone(330,0.08,'square',0.10,0.05);}
function sfxDamn(){nz(0.3,0.2,0,500,true);sfxTone(80,0.3,'sawtooth',0.2);sfxTone(60,0.4,'square',0.15,0.1);}
function sfxHourglass(){[440,550,660,880].forEach((f,i)=>sfxTone(f,0.08,'sine',0.12,i*0.06));}
function sfxGoal(){[330,440,550,660,880].forEach((f,i)=>sfxTone(f,0.12,'square',0.13,i*0.07));}

// Track0=Cave March(1-9面), Track1=No Return(30-39面), Track2=Last Resolve(10-19面), Track3=Beyond DAMN(20-29面), Track4=Open Sky(5,10,15...面)
function getBGMTrack(n){if(n%5===0)return 4;if(n<=9)return 0;if(n<=19)return 2;if(n<=29)return 3;if(n<=39)return 1;return 4;}
function getTempoKey(t){return t/MAX_TIME>0.25?'n':'r';}
function bgmTick(){
  const tr=TRACKS[bgmTrack],s=bgmStep%tr.bass.length,fill=(bgmStep%128)>=112;
  if(tr.bass[s])tone(tr.bass[s],bgmTempo*.8,'sawtooth',tr.bvol[s]||.1);
  if(tr.lead[s]){tone(tr.lead[s],bgmTempo*.45,'square',fill?.07:.05);if(fill)tone(tr.lead[s]*2,bgmTempo*.2,'square',.03,.02);}
  if(tr.pad[s])tone(tr.pad[s],bgmTempo*1.5,'sine',.04);
  if(tr.kick[s%16]){tone(60,.08,'sine',.15);tone(80,.04,'sine',.1,.01);}
  if(tr.snare[s%16])nz(.06,fill?.1:.07);
  if(tr.hh[s%16])nz(.02,.04);
  bgmStep++;
}
function startDrone(){
  if(droneNode)return;const a=getAC();
  droneNode=a.createOscillator();droneGain=a.createGain();
  const f=a.createBiquadFilter();f.type='lowpass';f.frequency.value=200;
  droneNode.connect(f);f.connect(droneGain);droneGain.connect(a.destination);
  droneNode.type='sawtooth';droneNode.frequency.value=55;droneNode.detune.value=8;
  droneGain.gain.value=.06*volBGM;droneNode.start();
}
function stopDrone(){if(droneNode){try{droneNode.stop();droneNode.disconnect();droneGain.disconnect();}catch(e){}droneNode=null;droneGain=null;}}
function startBGM(track){
  stopBGM();bgmTrack=track;bgmStep=0;
  const tr=TRACKS[track];bgmTempo=tr.tempo[getTempoKey(timeLeft||30)];
  if(tr.drone)startDrone();
  bgmTimer=setInterval(bgmTick,bgmTempo*1000);
}
function stopBGM(){clearInterval(bgmTimer);bgmTimer=null;stopDrone();}
function updateBGMTempo(){
  const tr=TRACKS[bgmTrack],key=getTempoKey(timeLeft),nt=tr.tempo[key];
  if(Math.abs(nt-bgmTempo)>.01){bgmTempo=nt;stopBGM();startBGM(bgmTrack);}
}

document.addEventListener('keydown',e=>{
  if(e.key==='Tab'){e.preventDefault();
    if(document.getElementById('settings').classList.contains('open'))closeSettings();
    else openSettings();
    return;
  }
  if(!prevKeys[e.key])keys[e.key]=true;
  if([' ','ArrowUp','ArrowDown'].includes(e.key))e.preventDefault();
  if(state==='title'){
    inputBuf.push(e.key);if(inputBuf.length>20)inputBuf.shift();
    const b=inputBuf;
    if(b.length>=14&&ADMIN_SEQ.every((k,i)=>k===b.slice(-14)[i])){adminMode=!adminMode;inputBuf=[];return;}
    if(b.length>=5){
      if(HARD_SEQ.every((k,i)=>k===b.slice(-5)[i])){hardMode=!hardMode;inputBuf=[];return;}
      if(RETRO_SEQ.every((k,i)=>k===b.slice(-5)[i])){retroMode=!retroMode;inputBuf=[];return;}
    if(b.length>=6&&EASY_SEQ.every((k,i)=>k===b.slice(-6)[i])){easyMode=!easyMode;inputBuf=[];floatMsgs.push({txt:easyMode?'BABY MODE ON':'BABY MODE OFF',x:W/2,y:H/2,life:2,color:'rgba(255,180,255,1)'});return;}
    }
  }
},{passive:false});
document.addEventListener('keyup',e=>{keys[e.key]=false;prevKeys[e.key]=false;});

function loadStage(n){
  const s=STAGES[Math.min(n-1,STAGES.length-1)];
  const fallSet=new Set(s.fall.map(b=>`${b.x},${b.y}`));
  platforms=s.plats.filter(p=>!fallSet.has(`${p.x},${p.y}`)).map(p=>({...p}));
  spikes=s.spikes.map(p=>({...p,falling:false,vy:0}));
  hourglasses=s.hg.map(h=>({...h,taken:false}));
  goal={...s.goal};
  trapSpikes=s.traps.map(t=>({...t,triggered:false,visible:false,
    timer:hardMode?0.1:0.4,
    warn:hardMode?false:t.warn}));
  fallingBlocks=s.fall.map(b=>({...b,falling:false,vy:0,shakeT:0,triggered:false,gone:false}));
  movingPlatforms=s.move?s.move.map(p=>({...p,phase:0})):[];
  mimics=s.mimics?s.mimics.map(m=>({...m,triggered:false,exploded:false,timer:0})):[];
  ceilingTraps=s.ceiling?s.ceiling.map(c=>({...c,triggered:false,visible:false,timer:0})):[];
  player={x:s.spawn.x,y:s.spawn.y,vx:0,vy:0,w:28,h:44,onGround:false,facing:1,walkT:0};
  stageNum=n;
}

function resetRun(){
  timeLeft=easyMode?60:hardMode?25:30;score=0;
  loadStage(1);damnEffect=null;damnTimer=0;floatMsgs=[];
}

// ======== PHYSICS ========
function overlap(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;}

// Track which moving platform player is standing on
let playerPlatform=null;
let mimics=[],ceilingTraps=[];

function resolvePlayer(){
  // Apply moving platform carry to player before resolving
  if(playerPlatform){
    player.x+=playerPlatform.dx||0;
    player.y+=playerPlatform.dy||0;
  }

  const allPlats=[...platforms,...fallingBlocks.filter(b=>!b.falling&&!b.gone),...movingPlatforms];

  // X movement + horizontal collision
  player.x+=player.vx;
  player.x=Math.max(0,Math.min(W-player.w,player.x));
  for(const p of allPlats){
    if(overlap(player,p)){
      // Only resolve horizontally if player center is closer to side than top/bottom
      const overlapLeft=player.x+player.w-p.x;
      const overlapRight=p.x+p.w-player.x;
      const overlapTop=player.y+player.h-p.y;
      const overlapBottom=p.y+p.h-player.y;
      const minH=Math.min(overlapLeft,overlapRight);
      const minV=Math.min(overlapTop,overlapBottom);
      if(minH<minV){
        // Horizontal push
        if(overlapLeft<overlapRight){player.x=p.x-player.w;}
        else{player.x=p.x+p.w;}
        player.vx=0;
      }
    }
  }

  // Y movement + vertical collision
  player.onGround=false;
  playerPlatform=null;
  player.y+=player.vy;
  for(const p of allPlats){
    if(overlap(player,p)){
      const overlapLeft=player.x+player.w-p.x;
      const overlapRight=p.x+p.w-player.x;
      const overlapTop=player.y+player.h-p.y;
      const overlapBottom=p.y+p.h-player.y;
      const minH=Math.min(overlapLeft,overlapRight);
      const minV=Math.min(overlapTop,overlapBottom);
      if(minV<=minH){
        if(player.vy>=0&&overlapTop<overlapBottom){
          player.y=p.y-player.h;
          player.vy=0;
          player.onGround=true;
          if(movingPlatforms.includes(p))playerPlatform=p;
        } else if(player.vy<0&&overlapBottom<=overlapTop){
          player.y=p.y+p.h;
          player.vy=0;
        }
      }
    }
  }
  // Hard clamp to screen
  player.x=Math.max(0,Math.min(W-player.w,player.x));
}

// ======== DRAW ========
function neonText(txt,x,y,color,size,blur,align){
  ctx.save();ctx.shadowColor=color;ctx.shadowBlur=blur||12;
  ctx.fillStyle=color;ctx.font=`bold ${size}px "Courier New"`;
  ctx.textAlign=align||'left';ctx.fillText(txt,x,y);ctx.restore();
}

function drawBg(isTitle){
  if(isTitle){ctx.fillStyle='#050508';ctx.fillRect(0,0,W,H);return;}
  // Background grid: 16px cells = 80x45 = 3600 blocks (sales grid)
  const BG=16,BGW=80,BGH=45;
  for(let gy=0;gy<BGH;gy++){
    for(let gx=0;gx<BGW;gx++){
      ctx.fillStyle=(gx+gy)%2===0?'#1c1c28':'#1a1a26';
      ctx.fillRect(gx*BG,gy*BG,BG,BG);
      ctx.strokeStyle='#242436';ctx.lineWidth=0.3;
      ctx.strokeRect(gx*BG,gy*BG,BG,BG);
    }
  }
}

function drawPlatform(p,shake){
  const pulse=Math.sin(animT*1.5)*.1+.9,sx=shake?(Math.random()*4-2):0;
  ctx.save();
  ctx.fillStyle='rgba(0,0,0,0.65)';ctx.fillRect(p.x+sx,p.y,p.w,p.h);
  ctx.shadowColor=`rgba(160,200,255,${pulse})`;ctx.shadowBlur=14;
  ctx.strokeStyle=`rgba(180,215,255,${shake?.4:pulse*.85})`;ctx.lineWidth=2;
  ctx.strokeRect(p.x+sx,p.y,p.w,p.h);
  ctx.shadowColor='rgba(255,255,255,0.9)';ctx.shadowBlur=6;
  ctx.strokeStyle=shake?'rgba(255,100,80,0.9)':'rgba(255,255,255,0.85)';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(p.x+sx,p.y);ctx.lineTo(p.x+sx+p.w,p.y);ctx.stroke();
  ctx.restore();
}

function drawSpike(s,col){
  if(s.y>H+50)return;
  col=col||'rgba(220,80,60,0.85)';
  // Draw multiple teeth to fill the spike block width
  const teeth=Math.max(1,Math.floor(s.w/20));
  const tw=s.w/teeth;
  ctx.save();ctx.shadowColor=col.replace('.85','.6');ctx.shadowBlur=8;
  ctx.strokeStyle=col;ctx.lineWidth=1.8;ctx.fillStyle='rgba(0,0,0,0.5)';
  for(let i=0;i<teeth;i++){
    const tx=s.x+i*tw,cx=tx+tw/2;
    ctx.beginPath();ctx.moveTo(tx,s.y+s.h);ctx.lineTo(cx,s.y);ctx.lineTo(tx+tw,s.y+s.h);ctx.closePath();ctx.fill();ctx.stroke();
  }
  ctx.restore();
}

function drawTrapSpike(t){
  if(!t.visible||t.y>H+50)return;
  if(t.warn&&(!t.triggered||t.timer>0)){
    if(Math.floor(animT*6)%2===0)drawSpike(t,'rgba(255,200,50,0.9)');
  } else {drawSpike(t);}
}

function drawMovingPlatform(p){
  drawPlatform(p,false);
  const dir=p.vx>0?1:p.vx<0?-1:0;
  if(dir!==0){
    ctx.save();ctx.fillStyle='rgba(180,215,255,0.2)';
    const ax=p.x+p.w/2+dir*12,ay=p.y+p.h/2;
    ctx.beginPath();ctx.moveTo(ax,ay-4);ctx.lineTo(ax+dir*8,ay);ctx.lineTo(ax,ay+4);ctx.fill();
    ctx.restore();
  }
}

function drawHourglass(h){
  if(h.taken)return;
  const bob=Math.sin(animT*3+h.x*.01)*4,cx=h.x+h.w/2,cy=h.y+bob;
  const col='rgba(130,255,200,0.9)';
  ctx.save();ctx.shadowColor=col;ctx.shadowBlur=12;ctx.strokeStyle=col;ctx.lineWidth=2;ctx.fillStyle='rgba(0,0,0,0.5)';
  ctx.beginPath();ctx.moveTo(cx-10,cy-12);ctx.lineTo(cx+10,cy-12);ctx.lineTo(cx,cy);ctx.closePath();ctx.fill();ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx-10,cy+12);ctx.lineTo(cx+10,cy+12);ctx.lineTo(cx,cy);ctx.closePath();ctx.fill();ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx-10,cy);ctx.lineTo(cx+10,cy);ctx.stroke();
  ctx.restore();
  neonText('+5s',cx,cy-20+bob,col,11,6,'center');
}

function drawMimic(m){
  if(m.exploded)return;
  const cx=m.x+m.w/2,cy=m.y+m.h/2;
  const pulse=Math.sin(animT*2)*.1+.9;
  ctx.save();
  // 宝箱本体
  ctx.shadowColor='rgba(180,120,40,0.8)';ctx.shadowBlur=10;
  ctx.fillStyle='rgba(80,45,10,0.9)';ctx.fillRect(m.x,m.y+m.h*0.35,m.w,m.h*0.65);
  ctx.fillStyle='rgba(100,60,15,0.9)';ctx.fillRect(m.x,m.y,m.w,m.h*0.38);
  // 金の縁
  ctx.strokeStyle=`rgba(200,150,30,${pulse})`;ctx.lineWidth=2;
  ctx.strokeRect(m.x+1,m.y+1,m.w-2,m.h-2);
  ctx.beginPath();ctx.moveTo(m.x,m.y+m.h*0.38);ctx.lineTo(m.x+m.w,m.y+m.h*0.38);ctx.stroke();
  // 錠前
  ctx.fillStyle=`rgba(220,170,40,${pulse})`;
  ctx.fillRect(cx-5,m.y+m.h*0.3,10,10);
  ctx.strokeStyle='rgba(150,100,20,0.9)';ctx.lineWidth=1.5;
  ctx.strokeRect(cx-5,m.y+m.h*0.3,10,10);
  // トリガー済みなら赤く震える
  if(m.triggered){
    ctx.shadowColor='rgba(255,50,50,1)';ctx.shadowBlur=20;

    ctx.strokeRect(m.x-2+Math.random()*4-2,m.y-2,m.w+4,m.h+4);

  ctx.restore();
}

function drawCeilingTrap(c){
  if(!c.visible)return;
  // 天井から降りてくるトゲ（逆さスパイク）
  const teeth=Math.max(1,Math.floor(c.w/20));
  const tw=c.w/teeth;
  const col=c.warn&&c.timer>0?'rgba(255,200,50,0.9)':'rgba(220,80,60,0.85)';
  ctx.save();ctx.shadowColor=col;ctx.shadowBlur=8;
  ctx.strokeStyle=col;ctx.lineWidth=1.8;ctx.fillStyle='rgba(0,0,0,0.5)';
  for(let i=0;i<teeth;i++){
    const tx=c.x+i*tw,cx2=tx+tw/2;
    // 逆さ（天井から下に向かって）
    ctx.beginPath();ctx.moveTo(tx,c.y);ctx.lineTo(cx2,c.y+c.h);ctx.lineTo(tx+tw,c.y);ctx.closePath();
    ctx.fill();ctx.stroke();
  }
  ctx.restore();
}

function drawPlayer(){
  const p=player,isMoving=p.onGround&&Math.abs(p.vx)>0.5;
  if(isMoving)p.walkT+=0.2;else p.walkT*=0.8;
  const leg=isMoving?Math.sin(p.walkT)*9:0,f=p.facing,x=p.x,y=p.y;
  const charCol=hardMode?'rgba(255,150,100,0.92)':'rgba(220,235,210,0.92)';
  ctx.save();ctx.shadowColor=charCol;ctx.shadowBlur=14;
  ctx.strokeStyle=charCol;ctx.fillStyle='rgba(0,0,0,0.72)';ctx.lineWidth=2.5;
  ctx.beginPath();ctx.moveTo(x-2,y+12);ctx.lineTo(x+30,y+12);ctx.stroke();
  ctx.beginPath();ctx.moveTo(x+2,y+12);ctx.lineTo(x+4,y);ctx.lineTo(x+24,y);ctx.lineTo(x+26,y+12);ctx.closePath();ctx.fill();ctx.stroke();
  ctx.strokeStyle='rgba(180,150,100,0.7)';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(x+4,y+8);ctx.lineTo(x+24,y+8);ctx.stroke();
  ctx.strokeStyle=charCol;ctx.lineWidth=2.5;
  ctx.beginPath();ctx.arc(x+14,y+18,7,0,Math.PI*2);ctx.fill();ctx.stroke();
  ctx.fillStyle=charCol;
  if(f>=0)ctx.fillRect(x+16,y+16,3,3);else ctx.fillRect(x+9,y+16,3,3);
  ctx.fillStyle='rgba(0,0,0,0.72)';
  ctx.strokeStyle='rgba(200,100,80,0.6)';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(x+14,y+24);ctx.quadraticCurveTo(x+(f>=0?22:6),y+28,x+(f>=0?20:8),y+32);ctx.stroke();
  ctx.strokeStyle=charCol;ctx.lineWidth=2.5;
  ctx.beginPath();ctx.moveTo(x+6,y+25);ctx.lineTo(x+22,y+25);ctx.lineTo(x+22,y+40);ctx.lineTo(x+6,y+40);ctx.closePath();ctx.fill();ctx.stroke();
  ctx.lineWidth=1.5;ctx.strokeRect(x+(f>=0?14:7),y+30,6,5);ctx.lineWidth=2.5;
  const arm=isMoving?Math.sin(p.walkT)*6:0;
  ctx.beginPath();ctx.moveTo(x+6,y+27);ctx.lineTo(x+2,y+37+arm);ctx.stroke();
  ctx.beginPath();ctx.moveTo(x+22,y+27);ctx.lineTo(x+26,y+37-arm);ctx.stroke();
  const lside=f>=0,lx=lside?x+27:x-9,ly=y+36-(lside?arm:-arm);
  ctx.save();ctx.shadowColor='rgba(255,200,80,0.8)';ctx.shadowBlur=10;
  ctx.strokeStyle='rgba(255,210,100,0.8)';ctx.lineWidth=1.5;
  ctx.strokeRect(lx,ly,8,10);ctx.fillStyle='rgba(255,200,80,0.25)';ctx.fillRect(lx,ly,8,10);
  ctx.restore();ctx.strokeStyle=charCol;ctx.lineWidth=2.5;
  ctx.beginPath();ctx.moveTo(x+9,y+40);ctx.lineTo(x+8,y+44+leg);ctx.stroke();
  ctx.beginPath();ctx.moveTo(x+19,y+40);ctx.lineTo(x+20,y+44-leg);ctx.stroke();
  ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(x+5,y+44+leg);ctx.lineTo(x+13,y+44+leg);ctx.stroke();
  ctx.beginPath();ctx.moveTo(x+17,y+44-leg);ctx.lineTo(x+25,y+44-leg);ctx.stroke();
  ctx.restore();
}

// ======== UPDATE ========
function update(dt){
  if(state==='play'){
    timeLeft-=dt;
    if(timeLeft<=0){lastDeathCause='time';lastDeathStage=stageNum;lastTimeLeft=0;triggerDeath();return;}
    if(keys['ArrowLeft']||keys['a']||keys['A']){player.vx=-5;player.facing=-1;}
    else if(keys['ArrowRight']||keys['d']||keys['D']){player.vx=5;player.facing=1;}
    else player.vx*=0.75;
    if((keys[' ']||keys['ArrowUp']||keys['w']||keys['W'])&&player.onGround){player.vy=-16;player.onGround=false;sfxJump();}
    player.vy+=0.7;if(player.vy>20)player.vy=20;
    // Update moving platforms and store delta for player carry
    for(const p of movingPlatforms){
      const px=p.x,py=p.y;
      p.phase+=dt;
      if(p.vx!==0)p.x=p.sx+Math.sin(p.phase*Math.abs(p.vx)*0.07)*p.rx;
      if(p.vy!==0)p.y=p.sy+Math.sin(p.phase*Math.abs(p.vy)*0.07)*p.ry;
      p.dx=p.x-px;
      p.dy=p.y-py;
    }
    resolvePlayer();
    for(const t of trapSpikes){
      // Only trigger if player is within Y range of the trap (prevents cross-level firing)
      const inYRange=player.y+player.h>t.y-160&&player.y<t.y+t.h+160;
      if(!t.triggered&&player.x>t.tx&&inYRange){t.triggered=true;t.visible=true;t.timer=t.warn?0.5:0;}
      if(t.triggered&&t.timer>0)t.timer-=dt;
    }
    for(const b of fallingBlocks){
      if(b.gone)continue;
      const onThis=player.x+player.w>b.x&&player.x<b.x+b.w&&
        player.y+player.h>=b.y-2&&player.y+player.h<=b.y+b.h+6&&player.vy>=0;
      if(onThis&&!b.triggered){b.triggered=true;b.shakeT=0.5;}
      if(b.triggered&&!b.falling){
        b.shakeT-=dt;
        if(b.shakeT<=0){
          b.falling=true;
          for(const s of spikes){
            if(!s.falling&&s.x+s.w>b.x&&s.x<b.x+b.w&&s.y+s.h>=b.y-32&&s.y<b.y+4){
              s.falling=true;s.vy=0;
            }
          }
        }
      }
      if(b.falling){b.vy+=1.5;b.y+=b.vy;if(b.y>H+100)b.gone=true;}
    }
    for(const s of spikes){if(s.falling){s.vy+=1.5;s.y+=s.vy;}}
    if(player.y>H+60){lastDeathCause='fall';lastDeathStage=stageNum;lastTimeLeft=timeLeft;triggerDeath();return;}
    for(const s of spikes){
      if(s.y>H+50)continue;
      if(overlap(player,{x:s.x+4,y:s.y+4,w:s.w-8,h:s.h-8})){lastDeathCause='spike';lastDeathStage=stageNum;lastTimeLeft=timeLeft;triggerDeath();return;}
    }
    for(const t of trapSpikes){
      if(t.visible&&t.timer<=0&&overlap(player,{x:t.x+4,y:t.y+4,w:t.w-8,h:t.h-8})){lastDeathCause='trap';lastDeathStage=stageNum;lastTimeLeft=timeLeft;triggerDeath();return;}
    }
    for(const h of hourglasses){
      if(!h.taken&&overlap(player,{x:h.x,y:h.y,w:h.w,h:h.h})){
        h.taken=true;timeLeft=Math.min(MAX_TIME,timeLeft+5);score+=50;
        floatMsgs.push({txt:'+5s!',x:h.x+12,y:h.y,life:1.2});sfxHourglass();
      }
    }
    // Mimic check
    for(const m of mimics){
      if(m.exploded)continue;
      const dist=Math.abs((player.x+player.w/2)-(m.x+m.w/2));
      if(dist<64&&Math.abs((player.y+player.h/2)-(m.y+m.h/2))<64){
        if(!m.triggered)m.triggered=true;
      }
      if(m.triggered){
        m.timer+=dt;
        if(m.timer>0.4){
          m.exploded=true;
          // spawn trap spikes around mimic
          lastDeathCause='trap';lastDeathStage=stageNum;lastTimeLeft=timeLeft;
          triggerDeath();return;
        }
      }
    }
    // Ceiling traps
    for(const c of ceilingTraps){
      if(!c.triggered&&player.x>c.tx){c.triggered=true;c.visible=true;c.timer=c.warn?0.5:0;}
      if(c.triggered&&c.timer>0)c.timer-=dt;
      if(c.visible&&c.timer<=0&&overlap(player,{x:c.x+4,y:c.y,w:c.w-8,h:c.h})){
        lastDeathCause='trap';lastDeathStage=stageNum;lastTimeLeft=timeLeft;
        triggerDeath();return;
      }
    }
    if(overlap(player,goal)){incStat('points',50);incStat('totalClears');if(easyMode)easyModeSavedStage=stageNum+1;
      const next=stageNum+1;
      timeLeft=Math.min(MAX_TIME,timeLeft+3);score+=500+Math.floor(timeLeft*10);sfxGoal();
      if(next<=STAGES.length){
        loadStage(next);floatMsgs.push({txt:'STAGE '+next+'!',x:W/2,y:H/2,life:2,color:'rgba(255,220,50,1)'});
        if(easyMode)floatMsgs.push({txt:'Cleared Baby Mode? Cool. Nobody cares.',x:W/2,y:H/2+48,life:3,color:'rgba(255,180,255,0.8)'});
        const nt=getBGMTrack(next);if(nt!==bgmTrack)startBGM(nt);
      } else {
        floatMsgs.push({txt:'ALL CLEAR!!',x:W/2,y:H/2,life:3,color:'rgba(255,220,50,1)'});
      }
    }
    updateBGMTempo();
    const pauseKey=(keys['Escape']&&!prevKeys['Escape'])||(keys['f']&&!prevKeys['f'])||(keys['F']&&!prevKeys['F']);
    if(pauseKey){state='pause';stopBGM();}
    if(adminMode){
      if(keys['n']&&!prevKeys['n']){loadStage(Math.min(STAGES.length,stageNum+1));startBGM(getBGMTrack(stageNum));floatMsgs=[];}
      if(keys['v']&&!prevKeys['v']){loadStage(Math.max(1,stageNum-1));startBGM(getBGMTrack(stageNum));floatMsgs=[];}
    }
    if(damnTimer>0)damnTimer-=dt;else damnEffect=null;
  } else if(state==='pause'){
    const resumeKey=(keys['Escape']&&!prevKeys['Escape'])||(keys['f']&&!prevKeys['f'])||(keys['F']&&!prevKeys['F']);
    if(resumeKey){state='play';startBGM(bgmTrack);}
    if(keys['t']&&!prevKeys['t']){resetRun();stopBGM();state='title';}
    if(adminMode){
      if(keys['n']&&!prevKeys['n']){loadStage(Math.min(STAGES.length,stageNum+1));startBGM(getBGMTrack(stageNum));state='play';}
      if(keys['v']&&!prevKeys['v']){loadStage(Math.max(1,stageNum-1));startBGM(getBGMTrack(stageNum));state='play';}
    }
  } else if(state==='title'){
    if(keys[' ']&&!prevKeys[' ']){resetRun();state='play';startBGM(getBGMTrack(1));}
  } else if(state==='dead'){
    if(keys[' ']&&!prevKeys[' ']){
      if(adminMode){loadStage(stageNum);timeLeft=hardMode?25:30;damnEffect=null;damnTimer=0;floatMsgs=[];}
      else if(easyMode){loadStage(easyModeSavedStage);timeLeft=60;damnEffect=null;damnTimer=0;floatMsgs=[];}
      else resetRun();
      state='play';startBGM(getBGMTrack(stageNum));
    }
    if(keys['t']&&!prevKeys['t']){resetRun();stopBGM();state='title';}
    if(keys['s']&&!prevKeys['s'])shareDeathCount();
  }
  Object.keys(keys).forEach(k=>{if(keys[k])prevKeys[k]=true;else delete prevKeys[k];});
}

// Flash overlay for death
let deathFlash=0;

function triggerDeath(){
  damnEffect={x:player.x+player.w/2,y:player.y};damnTimer=1.5;state='dead';sfxDamn();stopBGM();
  deathFlash=1.0;
  lastDeathMsg=getDeathMsg(lastDeathCause);

  // Stats
  incStat('totalDeaths');
  incStat('deaths_stage_'+lastDeathStage);
  const best=getStat('bestStage',1);
  if(lastDeathStage>best)setStat('bestStage',lastDeathStage);
  incStat('totalStagesReached',lastDeathStage);

  // Points: 1pt per death, bonus for stage reached
  incStat('points',1);
  incStat('points',lastDeathStage*2);
  if(lastDeathCause==='time'&&lastTimeLeft>=0&&lastTimeLeft<1)incStat('points',5); // near miss bonus
}

function loop(ts){
  const dt=Math.min((ts-last)/1000,0.05);
  last=ts;animT=ts/1000;
  if(state==='title'){drawTitle();}
  else{
    drawBg(false);
    for(const b of fallingBlocks){if(!b.gone)drawPlatform(b,b.triggered&&!b.falling&&b.shakeT>0);}
    for(const p of platforms)drawPlatform(p);
    for(const p of movingPlatforms)drawMovingPlatform(p);
    for(const s of spikes)drawSpike(s);
    for(const t of trapSpikes)drawTrapSpike(t);
    for(const h of hourglasses)drawHourglass(h);
    for(const m of mimics)drawMimic(m);
    for(const c of ceilingTraps)drawCeilingTrap(c);
    drawGoal();drawPlayer();drawFloatMsgs();drawUI();
    if(state==='pause')drawPause();
    if(state==='dead')drawDead();
    if(deathFlash>0){ctx.fillStyle=`rgba(255,30,30,${deathFlash*.55})`;ctx.fillRect(0,0,W,H);deathFlash=Math.max(0,deathFlash-dt*3);}
    drawDamn();
    if(retroMode)drawRetroOverlay();
  }
  floatMsgs=floatMsgs.filter(m=>(m.life-=dt)>0);
  update(dt);
  requestAnimationFrame(loop);
