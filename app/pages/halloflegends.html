<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>HALL OF LEGENDS — neverEND</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://cokcftutqkwhfbmdnhgl.supabase.co">
<link rel="preconnect" href="https://neverend.vercel.app" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#080810;
  --accent:#4ab8ff;
  --gold:#f5c842;
  --red:#ff3c3c;
  --green:#39ff14;
  --muted:#556;
  --muted2:#778;
  --border:rgba(74,184,255,0.18);
}
html,body{height:100%;background:var(--bg);color:#c8d8f0;font-family:'Courier New',monospace;}
body{min-height:100vh;padding:0 0 60px;}

body::before{
  content:'';position:fixed;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.07) 2px,rgba(0,0,0,0.07) 4px);
  pointer-events:none;z-index:9999;
}

header{
  background:rgba(0,0,0,0.8);
  border-bottom:1px solid var(--border);
  padding:18px 32px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
}
.logo{font-size:22px;letter-spacing:3px;font-weight:bold;color:#fff;}
.logo span{color:var(--red);text-shadow:0 0 12px rgba(255,60,60,0.8);}
.back-btn{
  background:none;border:1px solid rgba(74,184,255,0.4);color:var(--accent);
  padding:6px 14px;font-family:'Courier New',monospace;font-size:12px;
  letter-spacing:2px;cursor:pointer;text-transform:uppercase;white-space:nowrap;
  transition:all 0.2s;text-decoration:none;display:inline-block;
}
.back-btn:hover{border-color:var(--accent);}

.main{max-width:900px;margin:0 auto;padding:40px 20px;}

h1{
  font-size:32px;letter-spacing:6px;text-transform:uppercase;text-align:center;
  color:var(--gold);
  text-shadow:0 0 24px rgba(245,200,66,0.7),0 0 48px rgba(245,200,66,0.3);
  margin-bottom:8px;
}
.subtitle{
  text-align:center;font-size:12px;letter-spacing:3px;color:var(--muted2);
  margin-bottom:40px;text-transform:uppercase;
}

.section{
  background:rgba(255,255,255,0.03);
  border:1px solid var(--border);
  margin-bottom:32px;
}
.section-title{
  font-size:12px;letter-spacing:4px;color:var(--accent);
  padding:12px 20px;border-bottom:1px solid var(--border);
  text-transform:uppercase;
}

/* Table */
.rank-table{width:100%;border-collapse:collapse;}
.rank-table thead tr{border-bottom:1px solid var(--border);}
.rank-table th{
  padding:10px 16px;font-size:11px;letter-spacing:3px;
  color:var(--muted2);text-transform:uppercase;text-align:left;
  font-weight:normal;
}
.rank-table td{
  padding:12px 16px;font-size:14px;border-bottom:1px solid rgba(255,255,255,0.04);
}
.rank-table tr:last-child td{border-bottom:none;}
.rank-table tbody tr:hover{background:rgba(74,184,255,0.04);}

.rank-num{color:var(--muted);font-size:12px;width:40px;}
.rank-num.top1{color:var(--gold);text-shadow:0 0 8px rgba(245,200,66,0.6);font-size:16px;}
.rank-num.top2{color:#c0c0c0;}
.rank-num.top3{color:#cd7f32;}
.rank-name{color:#e0eaff;font-size:15px;letter-spacing:1px;}
.rank-floor{color:var(--accent);font-size:16px;text-align:right;font-weight:bold;text-shadow:0 0 8px rgba(74,184,255,0.5);}
.rank-deaths{color:rgba(255,100,100,0.8);text-align:right;font-size:13px;}
.rank-time{color:var(--muted2);text-align:right;font-size:12px;}

.loading{text-align:center;padding:48px 20px;color:var(--muted2);font-size:13px;letter-spacing:2px;}
.empty{text-align:center;padding:48px 20px;color:var(--muted);font-size:12px;letter-spacing:2px;}
.error-msg{text-align:center;padding:32px 20px;color:rgba(255,80,80,0.7);font-size:12px;letter-spacing:1px;}

/* Stats bar — 3 cells */
.stats-bar{display:flex;gap:0;}
.stat-cell{
  flex:1;padding:20px 20px;text-align:center;
  border-right:1px solid var(--border);
}
.stat-cell:last-child{border-right:none;}
.stat-val{font-size:24px;color:var(--gold);text-shadow:0 0 10px rgba(245,200,66,0.4);display:block;margin-bottom:6px;}
.stat-lbl{font-size:10px;letter-spacing:3px;color:var(--muted2);text-transform:uppercase;}

/* Test Pilots */
.pilots-desc{
  padding:14px 20px 6px;font-size:12px;color:var(--muted2);letter-spacing:1px;
  border-bottom:1px solid var(--border);
}
.pilots-grid{
  display:flex;flex-wrap:wrap;gap:10px 20px;padding:20px;
}
.pilot-name{
  font-size:16px;color:var(--accent);
  text-shadow:0 0 10px rgba(74,184,255,0.6),0 0 20px rgba(74,184,255,0.3);
  letter-spacing:1px;
}

footer{
  text-align:center;padding:20px;
  font-size:10px;letter-spacing:2px;color:var(--muted);
  border-top:1px solid var(--border);margin-top:40px;
}
</style>
</head>
<body>

<header>
  <a href="/" class="back-btn">[ BACK TO GAME ]</a>
  <div class="logo">never<span>END</span></div>
  <div style="width:140px;"></div>
</header>

<div class="main">
  <h1>Hall of Legends</h1>
  <div class="subtitle">Top players — sorted by floor reached</div>

  <!-- Summary stats (3 cells only) -->
  <div class="section">
    <div class="section-title">// GLOBAL STATS</div>
    <div class="stats-bar">
      <div class="stat-cell"><span class="stat-val" id="statFloor">—</span><span class="stat-lbl">Best Floor</span></div>
      <div class="stat-cell"><span class="stat-val" id="statDeaths">—</span><span class="stat-lbl">Total Deaths</span></div>
      <div class="stat-cell"><span class="stat-val" id="statHours">—</span><span class="stat-lbl">Total Hours</span></div>
    </div>
  </div>

  <!-- Ranking table -->
  <div class="section">
    <div class="section-title">// FLOOR RANKING — TOP 100</div>
    <div id="rankingContainer">
      <div class="loading">LOADING...</div>
    </div>
  </div>

  <!-- Test Pilots (hidden until data loads) -->
  <div class="section" id="pilotsSection" style="display:none;">
    <div class="section-title">// TEST PILOTS</div>
    <div class="pilots-desc">These players shaped neverEND from the very beginning.</div>
    <div class="pilots-grid" id="pilotsGrid"></div>
  </div>
</div>

<footer>&copy; 2025 Carila · neverEND · Hall of Legends</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const _SB_URL='https://cokcftutqkwhfbmdnhgl.supabase.co';
const _SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNva2NmdHV0cWt3aGZibWRuaGdsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNjk1NjIsImV4cCI6MjA5MDY0NTU2Mn0.FkDkRI8Ec5P07EKEZiGMA_kQ44rK0Pu6Hy_yeWBO3cQ';

function fmtTime(secs){
  const h=Math.floor(secs/3600),m=Math.floor((secs%3600)/60);
  if(h>0)return h+'h '+m+'m';
  return m+'m';
}

function buildRankingHTML(data){
  if(!data||data.length===0)return '<div class="empty">NO LEGENDS YET.<br><br>Be the first.</div>';
  let html='<table class="rank-table"><thead><tr>';
  html+='<th>#</th><th>NAME</th><th style="text-align:right">BEST FLOOR</th><th style="text-align:right">DEATHS</th><th style="text-align:right">PLAY TIME</th>';
  html+='</tr></thead><tbody>';
  data.forEach((r,i)=>{
    const rank=i+1;
    const rankClass=rank===1?'rank-num top1':rank===2?'rank-num top2':rank===3?'rank-num top3':'rank-num';
    const medal=rank===1?'🥇':rank===2?'🥈':rank===3?'🥉':rank;
    html+=`<tr>
      <td class="${rankClass}">${medal}</td>
      <td class="rank-name">${(r.name||'Anonymous').replace(/</g,'&lt;')}</td>
      <td class="rank-floor">${r.stage_reached||1}F</td>
      <td class="rank-deaths">${(r.death_count||0).toLocaleString()}</td>
      <td class="rank-time">${fmtTime(r.play_time||0)}</td>
    </tr>`;
  });
  return html+'</tbody></table>';
}

(async function(){
  const container=document.getElementById('rankingContainer');
  const sb=window.supabase.createClient(_SB_URL,_SB_KEY);
  try{
    const [ws,rankRes]=await Promise.all([
      fetch('https://neverend.vercel.app/api/world-stats').then(r=>r.json()).catch(()=>({})),
      sb.from('test_players')
        .select('name,stage_reached,death_count,play_time')
        .order('stage_reached',{ascending:false})
        .order('death_count',{ascending:true})
        .limit(100),
    ]);
    document.getElementById('statDeaths').textContent=Number(ws.total_deaths||0).toLocaleString();
    document.getElementById('statFloor').textContent=(ws.best_stage||0)+'F';
    document.getElementById('statHours').textContent=Math.floor((ws.total_play_time||0)/3600).toLocaleString()+'h';
    const pilots=ws.pilots||[];
    if(pilots.length>0){
      document.getElementById('pilotsGrid').innerHTML=pilots.map(n=>`<span class="pilot-name">${n.replace(/</g,'&lt;')}</span>`).join('');
      document.getElementById('pilotsSection').style.display='block';
    }
    if(rankRes.error)throw rankRes.error;
    container.innerHTML=buildRankingHTML(rankRes.data);
  }catch(err){
    container.innerHTML='<div class="error-msg">Could not load data.<br>'+(err&&err.message||'Network error')+'</div>';
  }
})();
</script>
</body>
</html>
