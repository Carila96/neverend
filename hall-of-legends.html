<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>HALL OF LEGENDS — neverEND</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#0a0a0a;color:#ccc;font-family:'Courier New',monospace;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:60px 20px 80px;}
  h1{color:#ffe033;font-size:32px;letter-spacing:8px;text-shadow:0 0 24px #ffe033,0 0 60px rgba(255,224,51,0.3);margin-bottom:10px;}
  .subtitle{color:rgba(180,160,100,0.6);font-size:12px;letter-spacing:3px;margin-bottom:60px;}
  .section{width:100%;max-width:600px;margin-bottom:50px;}
  .section-title{color:#ff6060;font-size:14px;letter-spacing:5px;border-bottom:1px solid rgba(255,80,80,0.25);padding-bottom:10px;margin-bottom:24px;text-shadow:0 0 10px rgba(255,80,80,0.5);}
  .section-title.hard{color:#c060ff;border-color:rgba(180,80,255,0.25);text-shadow:0 0 10px rgba(180,80,255,0.5);}
  .empty{color:rgba(120,120,120,0.5);font-size:12px;letter-spacing:2px;padding:20px 0;}
  .legend-entry{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid rgba(255,255,255,0.05);}
  .legend-name{color:#ffe033;font-size:14px;}
  .legend-date{color:rgba(150,150,150,0.5);font-size:11px;}
  .footer-note{color:rgba(100,100,100,0.5);font-size:11px;text-align:center;margin-top:40px;line-height:2;}
  .return-link{display:inline-block;margin-top:40px;color:rgba(100,180,255,0.6);font-size:12px;letter-spacing:3px;text-decoration:none;border:1px solid rgba(100,180,255,0.2);padding:10px 24px;}
  .return-link:hover{color:rgba(150,210,255,0.9);border-color:rgba(100,180,255,0.5);}
</style>
</head>
<body>
<h1>HALL OF LEGENDS</h1>
<p class="subtitle">World's first players to clear neverEND</p>

<div class="section">
  <div class="section-title">NORMAL MODE LEGENDS</div>
  <p class="empty">No one has cleared this yet.</p>
</div>

<div class="section">
  <div class="section-title hard">HARD MODE LEGENDS</div>
  <p class="empty">No one has cleared this yet.</p>
</div>

<p class="footer-note">
  Cleared the game?<br>
  Contact us at: <span style="color:rgba(255,224,51,0.5);">[carila email placeholder]</span>
</p>

<a href="/" id="returnLink" class="return-link">[ RETURN TO GAME ]</a>
<script>
(function(){
  const params=new URLSearchParams(window.location.search);
  const isTest=params.get('mode')==='test'||params.get('test')==='1'||sessionStorage.getItem('neverend_testmode')==='1'
    ||document.referrer.includes('mode=test')||document.referrer.includes('test=1');
  if(isTest){
    sessionStorage.setItem('neverend_testmode','1');
    document.getElementById('returnLink').href='/?mode=test';
  }
})();
</script>
</body>
</html>
